[app]
# 素材来源：本系统主用 AI 生成素材
#   "MiniMax" : 使用 apimart/gemini 生成图片（默认，推荐）
#   "pexels"  : 使用 Pexels 素材（需 pexels_api_keys）
#   "pixabay" : 使用 Pixabay 素材（需 pixabay_api_keys）
#   "local"   : 使用本地素材（需 video_materials）
video_source = "MiniMax"
hide_config = false

# ---------------------------------------------------------------------------
# LLM 专用
# ---------------------------------------------------------------------------
[llm]
api_key = ""
base_url = "https://api.wanyan.de/v1"
model = "deepseek-v4-flash"
timeout = 120

# ---------------------------------------------------------------------------
# 生图专用（OpenAI images/generations 兼容）
# ---------------------------------------------------------------------------
[image]
api_key = ""
base_url = "https://api.ephone.ai/v1"
model = "gemini-3.1-flash-image-preview"
size = "1024x1792"
timeout = 180

# ---------------------------------------------------------------------------
# TTS 专用
# provider=gemini  → Gemini generateContent AUDIO
# provider=openai  → /audio/speech
# ---------------------------------------------------------------------------
[tts]
provider = "gemini"
api_key = ""
base_url = "https://build2api.wanyan.de"
model = "gemini-3.1-flash-tts-preview"
voice = "Kore"
timeout = 120

# 旧版合并段（回退）
[openai]
api_key = ""
base_url = "https://api.openai.com/v1"
llm_model = "gpt-4o-mini"
image_model = "dall-e-3"
image_size = "1024x1792"
tts_model = "tts-1"
tts_voice = "alloy"
timeout = 120

[MiniMax]
# MiniMax 原生接口（当 [openai] 未配置时回退使用）
# 获取 Key: https://platform.minimaxi.com/
# 推荐 LLM 模型（2026）：MiniMax-M2.5 / MiniMax-M2.7-highspeed
api_key = ""
base_url = "https://api.minimaxi.com/v1"
llm_model = "MiniMax-M2.5"
tts_model = "speech-2.6-hd"

[siliconflow]
# 单词卡生图 / TTS 回退（[openai] 未配置时可能用到）
api_key = ""

[apimart]
# 句子生图回退（[openai] 未配置时可能用到）
# 获取 Key: https://apimart.ai/
api_key = ""

[bgm]
type = "random"
volume = 0.15

[ui]
hide_log = false
language = "zh"
tts_server = "minimax"
font_name = "MicrosoftYaHeiBold.ttc"
text_fore_color = "#FFFFFF"
font_size = 60

[azure]

[app.podcast]
default_speaker_1_voice = "zh-CN-XiaoxiaoNeural-Female"
default_speaker_2_voice = "zh-CN-YunxiNeural-Male"
podcast_dialogue_style = "conversational"
max_dialogue_turns = 1
min_article_length = 50
max_article_length = 50000
